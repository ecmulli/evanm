name: Energy Data Collection

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Number of days to backfill (leave empty for normal collection)'
        required: false
        type: number
      start_date:
        description: 'Backfill start date YYYY-MM-DD (inclusive)'
        required: false
        type: string
      end_date:
        description: 'Backfill end date YYYY-MM-DD (exclusive, defaults to today)'
        required: false
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/jobs/energy/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/jobs/energy/requirements.txt

      - name: Run energy job
        run: |
          ARGS=""
          if [ -n "${{ inputs.start_date }}" ]; then
            ARGS="--start-date ${{ inputs.start_date }}"
            if [ -n "${{ inputs.end_date }}" ]; then
              ARGS="$ARGS --end-date ${{ inputs.end_date }}"
            fi
          elif [ -n "${{ inputs.backfill_days }}" ]; then
            ARGS="--backfill ${{ inputs.backfill_days }}"
          fi
          python -m apps.jobs.energy $ARGS
        env:
          DATABASE_URL: ${{ secrets.ENERGY_DATABASE_URL }}
          ENPHASE_CLIENT_ID: ${{ secrets.ENPHASE_CLIENT_ID }}
          ENPHASE_CLIENT_SECRET: ${{ secrets.ENPHASE_CLIENT_SECRET }}
          ENPHASE_API_KEY: ${{ secrets.ENPHASE_API_KEY }}
          ENPHASE_SYSTEM_ID: ${{ secrets.ENPHASE_SYSTEM_ID }}
          ENPHASE_REFRESH_TOKEN: ${{ secrets.ENPHASE_REFRESH_TOKEN }}
          ENERGY_TIMEZONE: America/Chicago
