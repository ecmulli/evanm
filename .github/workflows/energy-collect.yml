name: Energy Data Collection

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Number of days to backfill (leave empty for normal collection)'
        required: false
        type: number

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/jobs/energy/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/jobs/energy/requirements.txt

      - name: Run collection
        if: ${{ !inputs.backfill_days }}
        run: python -m apps.jobs.energy
        env:
          DATABASE_URL: ${{ secrets.ENERGY_DATABASE_URL }}
          ENPHASE_CLIENT_ID: ${{ secrets.ENPHASE_CLIENT_ID }}
          ENPHASE_CLIENT_SECRET: ${{ secrets.ENPHASE_CLIENT_SECRET }}
          ENPHASE_API_KEY: ${{ secrets.ENPHASE_API_KEY }}
          ENPHASE_SYSTEM_ID: ${{ secrets.ENPHASE_SYSTEM_ID }}
          ENPHASE_REFRESH_TOKEN: ${{ secrets.ENPHASE_REFRESH_TOKEN }}
          ENERGY_TIMEZONE: America/Chicago

      - name: Run backfill
        if: ${{ inputs.backfill_days }}
        run: python -m apps.jobs.energy --backfill ${{ inputs.backfill_days }}
        env:
          DATABASE_URL: ${{ secrets.ENERGY_DATABASE_URL }}
          ENPHASE_CLIENT_ID: ${{ secrets.ENPHASE_CLIENT_ID }}
          ENPHASE_CLIENT_SECRET: ${{ secrets.ENPHASE_CLIENT_SECRET }}
          ENPHASE_API_KEY: ${{ secrets.ENPHASE_API_KEY }}
          ENPHASE_SYSTEM_ID: ${{ secrets.ENPHASE_SYSTEM_ID }}
          ENPHASE_REFRESH_TOKEN: ${{ secrets.ENPHASE_REFRESH_TOKEN }}
          ENERGY_TIMEZONE: America/Chicago
